name: email-triage
version: 1.0.0
description: Email Triage RL Environment
author: Vinamra1
license: MIT
tags:
  - email
  - nlp
  - classification

tasks:
  - name: easy_triage
    description: Classify obvious spam vs non-spam emails
    difficulty: easy
    max_steps: 1
    reward_range: [0.0, 1.0]
  - name: medium_triage
    description: Classify emails into SPAM, WORK, or PERSONAL
    difficulty: medium
    max_steps: 1
    reward_range: [0.0, 1.0]
  - name: hard_triage
    description: Classify ambiguous emails
    difficulty: hard
    max_steps: 1
    reward_range: [0.0, 1.0]

server:
  port: 7860
  host: 0.0.0.0
